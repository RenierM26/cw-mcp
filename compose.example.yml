services:
  connectwise-manage-mcp:
    image: ghcr.io/renierm26/connectwise-manage-mcp:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TRANSPORT: http
      HOST: 0.0.0.0
      PORT: 8000
      AUTH_ENABLED: "true"
    ports:
      - "8000:8000"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=10)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
